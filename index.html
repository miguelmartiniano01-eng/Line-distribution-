        #pie-stage.pie-hidden { opacity: 0; max-height: 0px; padding: 0px; pointer-events: none; }
        #pie-canvas-wrapper { width: 130px; height: 130px; position: relative; }
        #pieChart { width: 130px !important; height: 130px !important; display: block;
        }

        #viewport-container { 
            width: 100%; flex: 1; display: flex; justify-content: center; box-sizing: border-box; padding: 0 25px; overflow-y: auto !important; -webkit-overflow-scrolling: touch; margin-bottom: 5px;
        }
        #viewport { 
            width: 90%; max-width: 500px; position: relative; margin: 60px auto; height: 100%; --row-height: 70px;
        }

        .member-row {
            position: absolute; width: 100%; height: var(--row-height); display: flex; align-items: center; padding: 0 10px; transition: transform 7s cubic-bezier(0.2, 1, 0.2, 1), opacity 0.3s ease; box-sizing: border-box; will-change: transform; touch-action: none; user-select: none; overflow: visible !important; /* Libera o brilho para todos os temas */
        }
       
        .active { z-index: 100 !important; }
        .is-muted { opacity: 0.5 !important; }


.member-row.active {
    z-index: 9999 !important;
    isolation: auto;
    transform: translate3d(0, 0, 1px); 
}
         



/* Remove qualquer deformação da avatar-box que causou o formato de ovo */
.avatar-box {
    width: auto !important;
    height: auto !important;
    border: none !important;
    background: transparent !important;
    box-shadow: none !important;
    transform: none !important;
}


/* 2. O m-avatar (A imagem real - o tamanho fica travado aqui!) */
.m-avatar {
    /* Define o tamanho fixo exato do círculo aqui */
    width: calc(var(--row-height) * 0.68) !important; 
    height: calc(var(--row-height) * 0.68) !important; 
    border-radius: 50% !important;
    object-fit: cover !important;
    display: block !important;
    
    /* Joga a borda para fora sem amassar a foto */
    box-sizing: content-box !important; 
    
    /* Borda sutil padrão */
    border: 3px solid #000 !important; 
    
    transition: transform 0.25s cubic-bezier(0.2, 1, 0.2, 1), border-color 0.25s ease, box-shadow 0.25s ease !important;
}

/* ==================== ESTADO ATIVO PADRÃO ==================== */
.active .m-avatar {
    transform: scale(1.15) !important;
    border-color: #fff !important; 
    border-width: 4px !important;
    box-shadow: 0 0 20px var(--m-color) !important; 
    
    transition-delay: 0.05s !important;
}

/* ==================== TEMA GLITCH ATIVO ==================== */
body.theme-glitch .member-row.active .m-avatar {
    animation: glitchJitter 0.3s infinite steps(2, jump-start) !important;
    border-color: #fff !important;
    border-width: 4px !important;
    
    /* Glitch perfeito sem bugar e sem entortar as estrelas */
    box-shadow: 
        6px 0 0 rgba(255, 0, 85, 0.95), 
        -6px 0 0 rgba(0, 255, 255, 0.95) !important;
        
    filter: none !important;
}



/* 3. TEMA GLITCH ATIVO (Usando a borda física + o glitch nas laterais) */
body.theme-glitch .member-row.active .m-avatar {
    animation: glitchJitter 0.3s infinite steps(2, jump-start) !important;
    
    /* Mantém a borda física branca brilhando */
    border-color: #fff !important;
    border-width: 4px !important;
    
    /* Joga o glitch rosa e ciano para fora da borda física */
    box-shadow: 
        6px 0 0 rgba(255, 0, 85, 0.95), 
        -6px 0 0 rgba(0, 255, 255, 0.95) !important;
        
    filter: none !important;
}


.m-name { 
    font-size: 15px; letter-spacing: 0.5px; color: #fff; 
    /* Prepara o nome para a transição suave do neon */
    transition: text-shadow 0.25s ease, color 0.25s ease;
}

.time-display { 
    font-size: 14px; font-variant-numeric: tabular-nums; color: #888; 
    display: flex; gap: 8px; align-items: center; pointer-events: auto; 
    /* Prepara o tempo para a transição suave */
    transition: color 0.25s ease;
}

.bar-fill {
    position: absolute; left: 0; top: 0; height: 40%; width: 0%;
    transition: width 0.0s linear; background: #fff; border-radius: 0 20px 20px 0;
    transform-origin: left !important;
}


/* ==================== 2. ESTADOS ATIVOS (COM DELAY DE 0.05s) ==================== */

/* Nome da integrante ativo */
.active .m-name { 
    color: #fff !important; 
    text-shadow: 0 0 5px #fff, 0 0 12px var(--m-color) !important; 
    transition-delay: 0.05s !important; /* Espera o delay curto */
}

/* Exibição de tempo ativo */
.active .time-display { 
    color: #fff !important; 
    transition-delay: 0.05s !important; 
}

/* 1. Wrapper do Avatar (Estrelinhas no centro perfeito) */
.avatar-wrap { 
    position: relative !important; 
    flex-shrink: 0; 
    margin-right: 15px; 
    overflow: visible !important; 
    z-index: 10;
    
    /* Deixa o flexbox ativo para as estrelas ficarem lindas e centralizadas */
    display: flex !important;
    justify-content: center !important;
    align-items: center !important;
    
    /* Mantém o tamanho exato da idol */
    width: calc(var(--row-height) * 0.68) !important;
    height: calc(var(--row-height) * 0.68) !important;
}

    /* 1. O Microfone Padrão (Com o contorno preto em volta de todo o desenho) */
.mic-icon {
    position: absolute !important;
    z-index: 15 !important;
    bottom: -8px !important;
    right: -10px !important;
    
    /* Define o tamanho perfeito dele na tela */
    width: 20px !important;
    height: 20px !important;
    
    /* Cor padrão do microfone antes de ser ativo (Branco) */
    color: #ffffff !important;
    
    /* Remove margens extras */
    margin: 0 !important;
    padding: 0 !important;
    
    /* O SEGREDO DO CONTORNO: Aplica uma bordinha preta fina de 1px em volta do desenho do SVG */
    filter: 
        drop-shadow(1px 0 0 #000) 
        drop-shadow(-1px 0 0 #000) 
        drop-shadow(0 1px 0 #000) 
        drop-shadow(0 -1px 0 #000) !important;
        
    transform: scale(1) !important;
    transform-origin: center center !important;
    transition: transform 0.25s cubic-bezier(0.2, 1, 0.2, 1), color 0.25s ease, filter 0.25s ease !important;
}

/* 2. O Microfone Ativo (Brilha na cor da integrante + mantém o contorno preto!) */
.active .mic-icon {
    /* O microfone muda para a cor personalizada da idol */
    color: #fff !important; 
    
    transform: scale(1.2) !important;
    
    /* Mantém o contorno preto por dentro para não sumir na foto e joga o brilho neon por fora! */
    filter: 
        drop-shadow(1px 0 0 #000) 
        drop-shadow(-1px 0 0 #000) 
        drop-shadow(0 1px 0 #000) 
        drop-shadow(0 -1px 0 #000)
        drop-shadow(0 0 6px var(--m-color)) !important;
        
    transition-delay: 0.05s !important;
}


/* Barra ativa */
.active .bar-fill { 
    box-shadow: 0 0 2px #fff, 0 0 6px var(--m-color); 
    /* Opcional: Adicione se quiser que a barra física espere para aparecer o box-shadow */
    transition: box-shadow 0.25s ease;
    transition-delay: 0.05s !important;
}

/* Onda neon da barra (O ::after começa a correr com o delay) */
.active .bar-fill::after {
    content: ""; position: absolute; inset: 0; border-radius: inherit;
    background: linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.6) 50%, transparent 100%);
    background-size: 200% 100%; 
    filter: blur(6px); opacity: 0.9;
    animation: ondaNeon 2s infinite linear !important;
    
    /* Faz a onda respeitar o delay antes de surgir na tela */
    animation-delay: 0.05s !important; 
}


/* ==================== 3. ANIMAÇÕES OUTROS (Resto do seu código) ==================== */
.custom-mute-icon { width: 13px; height: 13px; background: #ff4444; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

.edit-trigger-btn:active { background: rgba(255,255,255,0.5); }


/* 3. O Keyframe que move o brilho sempre para a frente */
@keyframes ondaNeon {
    from {
        background-position: 200% 0; /* Começa fora da barra na esquerda */
    }
    to {
        background-position: -200% 0; /* Termina fora da barra na direita */
    }
}

    <script>
    let members = [];
    let lastTime = 0;
    let activeLoop = null;
    let selectedLineGroups = [];
    let autoSort = true;
    let manualMax = 0; 
    let showMax = false;
    let saveDeleteMode = false;
    let currentLineHeight = 70; 
    let vocalPanelsMode = false;
    let showPieChart = false;
    let currentEditingMemberId = null;

    let currentSpeed = 1.0;
    const speedOptions = [1.0, 0.25, 0.5, 0.75, 1.25, 1.5, 1.75, 2.0, 2.25, 2.5, 3.0, 4.0, 5.0, 6.25, 7.5, 8.75, 10];
    let currentThemeIndex = 0;
    const themes = [ "orange", "yellow", "cream", "icon", "cyberneon", "spacial", "glitch", "comic", "m-color", "neon", "cyberpunk", "glow", "classic", "pink", "glassmorphism", "y2k", "mono", "vaporwave","darkforest", "stealth", "chroma", "glass"];

    const crystalColors = ["#6100ff", "#00E5FF", "#D000FF", "#FF0055", "#00FF66", "#FFDD00", "#0066FF"];

    window.addEventListener('load', () => { renderMainSetupSaves(); });

    function toggleLineGroup(index, btn) {
        if (selectedLineGroups.includes(index)) {
            selectedLineGroups = selectedLineGroups.filter(i => i !== index);
            btn.innerHTML = "⭐️";
        } else {
            selectedLineGroups.push(index);
            btn.innerHTML = "✅";
        }
    }

    function backToGroupsMenu(e) {
        if(e) e.preventDefault();
        if(activeLoop) cancelAnimationFrame(activeLoop);
        
        const v = document.getElementById('bg-video');
        v.pause(); v.removeAttribute('src'); v.load();
        document.getElementById('bg-video-container').style.display = 'none';
        document.getElementById('video-manual-bar').style.display = 'none';

        document.getElementById('app').classList.add('hidden');
        document.getElementById('setup').classList.remove('hidden');
        document.getElementById('step1').classList.remove('hidden');
        document.getElementById('step2').classList.add('hidden');
        
        vocalPanelsMode = false; showPieChart = false;
        showDockPanel();
        document.getElementById('sdv-btn').innerText = "DISPLAY SDV: OFF";
        document.getElementById('sdv-btn').classList.remove('btn-toggle-on');
        document.getElementById('pie-stage').classList.add('pie-hidden');
        document.getElementById('vocal-panel-toggle-btn').classList.remove('btn-toggle-on');
        document.getElementById('vocal-tap-panels-container').classList.add('hidden');
        
        renderMainSetupSaves();
    }

    function cycleSpeed(e) {
        if(e) e.preventDefault();
        let idx = speedOptions.indexOf(currentSpeed);
        idx = (idx + 1) % speedOptions.length;
        currentSpeed = speedOptions[idx];
        document.getElementById('speed-btn').innerText = `SPEED: ${currentSpeed}X`;
        const v = document.getElementById('bg-video');
        if (v && v.src) { v.playbackRate = currentSpeed; }
    }

    function cycleStyles(e) {
        if(e) e.preventDefault();
        document.body.classList.remove(`theme-${themes[currentThemeIndex]}`);
        currentThemeIndex = (currentThemeIndex + 1) % themes.length;
        let newTheme = themes[currentThemeIndex];
        document.body.classList.add(`theme-${newTheme}`);
        document.getElementById('theme-btn').innerText = `STYLE: ${newTheme.toUpperCase()}`;
    }

    function hideDockPanel(e) {
        if(e) e.preventDefault();
        document.getElementById('main-dock-panel').classList.add('dock-hidden');
        document.getElementById('restore-dock-trigger').style.display = 'block';
    }

    function selectFont(fontName) {
        document.body.classList.remove('font-segoe', 'font-poppins', 'font-montserrat', 'font-bebas', 'font-oswald', 'font-orbitron', 'font-rubik', 'font-quicksand', 'font-fredoka', 'font-inter');
        document.body.classList.add(`font-${fontName.toLowerCase()}`);
        closeFonts();
    }

    function handleFile(input, index) { 
        const file = input.files[0]; 
        if (file) { 
            const reader = new FileReader(); 
            reader.onload = function(e) { 
                const imgNode = new Image();
                imgNode.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = 120; canvas.height = 120;
                    let sourceX = 0, sourceY = 0, sourceWidth = imgNode.width, sourceHeight = imgNode.height;
                    if (imgNode.width > imgNode.height) {
                        sourceWidth = imgNode.height; sourceX = (imgNode.width - imgNode.height) / 2;
                    } else if (imgNode.height > imgNode.width) {
                        sourceHeight = imgNode.width; sourceY = (imgNode.height - imgNode.width) / 2;
                    }
                    ctx.drawImage(imgNode, sourceX, sourceY, sourceWidth, sourceHeight, 0, 0, 120, 120);
                    const compressedBase64 = canvas.toDataURL('image/png', 0.7);
                    input.setAttribute('data-img-src', compressedBase64); 
                    input.previousElementSibling.innerText = "✓ PHOTO ADDED"; 
                };
                imgNode.src = e.target.result;
            }; 
            reader.readAsDataURL(file); 
        } 
    }

        let cards = container.querySelectorAll('.editor-member-card');
        let listaNomes = Array.from(cards).map((card, idx) => {
            let nameVal = card.querySelector('.ni')?.value || "SEM NOME";
            return `${idx + 1}: ${nameVal}`;
        }).join("\n");

        let escolha = prompt(`DIGITE O NÚMERO DA INTEGRANTE QUE DESEJA REMOVER:\n\n${listaNomes}`);
        let idxOriginal = parseInt(escolha) - 1;

        if(!isNaN(idxOriginal) && idxOriginal >= 0 && idxOriginal < cards.length) {
            let nameVal = cards[idxOriginal].querySelector('.ni')?.value || "integrante";
            if(confirm(`TEM CERZEZA QUE DESEJA REMOVER ${nameVal}?`)) {
                container.removeChild(cards[idxOriginal]);

            }
        }
    }

function tgl(id) {
    let m = members.find(x => x.id === id);
    if (!m || m.muted) return;
    m.active = !m.active;
    const rowNode = document.getElementById(`row-${id}`);
    if(rowNode) rowNode.classList.toggle('active', m.active);
    if (vocalPanelsMode) { 
        const panelNode = document.getElementById(`vp-panel-${id}`);
        if(panelNode) panelNode.classList.toggle('vp-active', m.active);
    }
}

function muteTgl(e, id) {
    if (e) {
        e.stopPropagation(); 
        e.preventDefault();  
    }
    
    let m = members.find(x => x.id === id);
    if (!m) return;
    
    m.muted = !m.muted;

    const row = document.getElementById('row-' + id);
    const mic = document.getElementById('mic-' + id);
    
    if (row) {
        row.classList.toggle('is-muted', m.muted);
    }
    
    if (mic) {
        if (m.muted) {
            mic.classList.add('muted-active');
            // SVG redesenhado do zero com base na imagem (perfeitamente limpo e reto)
            mic.innerHTML = `
                <rect x="9" y="2" width="6" height="12" rx="3" fill="currentColor" />
                <path d="M12 17c2.76 0 5-2.24 5-5h1.5c0 3.25-2.42 5.93-5.5 6.42V21h3v1.5h-8V21h3v-2.58C7.92 17.93 5.5 15.25 5.5 12H7c0 2.76 2.24 5 5 5z" fill="currentColor" />
                <line x1="3.5" y1="20.5" x2="20.5" y2="3.5" stroke="black" stroke-width="2.5" />
                <line x1="3.5" y1="20.5" x2="20.5" y2="3.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
            `;
        } else {
            mic.classList.remove('muted-active');
            // Microfone padrão reestruturado para ser idêntico à base do mutado
            mic.innerHTML = `
                <rect x="9" y="2" width="6" height="12" rx="3" fill="currentColor" />
                <path d="M12 17c2.76 0 5-2.24 5-5h1.5c0 3.25-2.42 5.93-5.5 6.42V21h3v1.5h-8V21h3v-2.58C7.92 17.93 5.5 15.25 5.5 12H7c0 2.76 2.24 5 5 5z" fill="currentColor" />
            `;
        }
    }
    
    if (m.muted) { 
        m.active = false; 
        if(row) row.classList.remove('active'); 
    }
    
    if (vocalPanelsMode) { 
        const panelNode = document.getElementById(`vp-panel-${id}`); 
        if(panelNode) panelNode.classList.remove('vp-active'); 
    }
}


function resetTimers(e) {
    if(e) e.preventDefault();
    members.forEach(m => { 
        m.time = 0; 
        m.active = false; 
        m.muted = false; 
        
        const mic = document.getElementById(`mic-${m.id}`); 
        if(mic) {
            mic.classList.remove('muted-active');
            // Restaura o ícone original ligado
            mic.innerHTML = `<path fill="currentColor" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5-3c0 3-2.54 5.1-5.64 4.42C9.4 15.02 8 13.06 8 11H6c0 3.11 2.34 5.75 5.34 6.22V20H8c-.55 0-1 .45-1 1s.45 1 1 1h8c.55 0 1-.45 1-1s-.45-1-1-1h-3.34v-2.78c3-.47 5.34-3.11 5.34-6.22h-2z"/>`;
        }
    });
    document.querySelectorAll('.member-row').forEach(r => r.classList.remove('active', 'is-muted'));
    if(vocalPanelsMode) buildVocalPanelsDOM();
}


    function wipeAll(e) {
        if(e) e.preventDefault();
        if(!confirm("REWORK?")) return;
        if(activeLoop) cancelAnimationFrame(activeLoop);
        document.getElementById('inputs').innerHTML = ''; 
        document.getElementById('app').classList.add('hidden');
        document.getElementById('setup').classList.remove('hidden');
        document.getElementById('step1').classList.remove('hidden');
        document.getElementById('step2').classList.add('hidden');
        vocalPanelsMode = false; showPieChart = false; showDockPanel();
        document.getElementById('sdv-btn').innerText = "DISPLAY SDV: OFF";
        document.getElementById('sdv-btn').classList.remove('btn-toggle-on');
        document.getElementById('pie-stage').classList.add('pie-hidden');
        document.getElementById('vocal-panel-toggle-btn').classList.remove('btn-toggle-on');
        document.getElementById('vocal-tap-panels-container').classList.add('hidden');

        v.pause(); v.removeAttribute('src'); v.load();
        document.getElementById('bg-video-container').style.display = 'none';
        document.getElementById('video-manual-bar').style.display = 'none';

    }

        function drawPieChart(ctx, centerX, centerY, radius, total) {
        ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
        let useUniformSlices = total < 0.01;
        let rankedSlices = [...members];
        if (!useUniformSlices) rankedSlices.sort((a, b) => b.time - a.time);

        let startAngle = -Math.PI / 2;
        
        // Configurações da borda preta separadora
        ctx.strokeStyle = "#000"; // Cor igual ao fundo do app
        ctx.lineWidth = 1;            // Espessura da borda separadora

        rankedSlices.forEach(m => {
            let sliceAngle = useUniformSlices ? (2 * Math.PI / rankedSlices.length) : (m.time / total) * (2 * Math.PI);
            if (sliceAngle <= 0) return;
            let endAngle = startAngle + sliceAngle;
            
            // Desenha a fatia preenchendo a cor
            ctx.beginPath(); 
            ctx.moveTo(centerX, centerY); 
            ctx.arc(centerX, centerY, radius, startAngle, endAngle); 
            ctx.closePath(); 
            ctx.fillStyle = m.color; 
            ctx.fill();
            
            // Desenha a linha de contorno preta para separar as fatias
            ctx.stroke();
            
            startAngle = endAngle;
        });

        // EFEITO DONUT (Faz o furo perfeito no centro do gráfico)
        ctx.beginPath();
        // O raio do furo interno será 32 pixels (ajuste se quiser mais grosso ou fino)
        ctx.arc(centerX, centerY, 20, 0, 2 * Math.PI);
        ctx.closePath();
        ctx.fillStyle = "#000000"; // Cor preta idêntica ao fundo da tela
        ctx.fill();

          ctx.imageSmoothingEnabled = true;
ctx.imageSmoothingQuality = "high";
          ctx.save();
ctx.beginPath();
ctx.arc(65, 65, 60, 0, Math.PI * 2);
ctx.closePath();
ctx.restore();
    }

    function setupPieCanvas() {
    const canvas = document.getElementById('pieChart');
    if (!canvas) return;

    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const size = 130;

    // força tamanho visual fixo
    canvas.style.width = size + "px";
    canvas.style.height = size + "px";

    // tamanho real
    canvas.width = size * dpr;
    canvas.height = size * dpr;

    // 🔥 RESET TOTAL (IMPORTANTE)
    ctx.resetTransform();

    // desenha em coordenada limpa
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

        // ... (Mantenha todo o resto do seu script igual lá em cima)

    function loop() {
        let now = performance.now();
        let dt = ((now - lastTime) / 1000) * currentSpeed;
        lastTime = now;
        members.forEach(m => { if(m.active && !m.muted) m.time += dt; });
        let total = members.reduce((a, b) => a + b.time, 0) || 0;
        let targetMax = showMax && manualMax > 0 ? manualMax : Math.max(...members.map(m => m.time), 0.1);

        if (showPieChart) {
            const canvas = document.getElementById('pieChart');
            if (canvas) {
                const ctx = canvas.getContext('2d');
                const size = 130;
                const dpr = (window.devicePixelRatio * (window.visualViewport?.scale || 1.5)) *2;

                if (canvas.width !== size * dpr) {
                    canvas.width = size * dpr;
                    canvas.height = size * dpr;
                }

                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.scale(dpr, dpr);
                drawPieChart(ctx, size / 2, size / 2, 60, total);
            }
        }

        let displayOrder = [...members];
        if (autoSort) displayOrder.sort((a, b) => b.time - a.time);

        displayOrder.forEach((m, i) => {
            let r = document.getElementById(`row-${m.id}`);
            if(!r) return;
            document.getElementById(`box-${m.id}`).innerText = m.time.toFixed(1);
            document.getElementById(`pct-${m.id}`).innerText = (total > 0.01 ? ((m.time/total)*100).toFixed(1) : "0.0") + "%";
            document.getElementById(`pct-${m.id}`).style.color = '#d2d2d2'; 
            
            let barFill = document.getElementById(`bar-${m.id}`);
            let calculatedWidth = Math.min((m.time / targetMax) * 100, 100);
            
            barFill.style.width = calculatedWidth + "%";
            
            if (calculatedWidth <= 0) {
                barFill.style.opacity = "0";
            } else {
                barFill.style.opacity = "1";
            }

            // AJUSTE AQUI: Define a posição vertical
            r.style.transform = `translate3d(0, ${(autoSort ? i : m.id) * currentLineHeight}px, 0)`;
            
            // SOLUÇÃO DO BUG: Dá prioridade de z-index para quem está em primeiro no ranking
            // e prioridade extra se a integrante estiver ativa cantando.
            let baseZIndex = displayOrder.length - i; 
            if (m.active) {
                r.style.zIndex = baseZIndex + 100; // Joga pra frente de tudo se estiver ativa
            } else {
                r.style.zIndex = baseZIndex; // Mantém a ordem do ranking correta
            }
        });
        activeLoop = requestAnimationFrame(loop);
    }

    function exportGroups() {
    let rawData = localStorage.getItem('KPOP_LINE_SAVED_GROUPS');
    let arrayData = rawData ? JSON.parse(rawData) : [];
    let blob = new Blob([JSON.stringify(arrayData, null, 2)], { type: 'application/json' });
    let url = URL.createObjectURL(blob);
    let a = document.createElement('a');
    a.href = url;
    a.download = `line-distribution-backup-${Date.now()}.json`;
    a.click();
    URL.revokeObjectURL(url);
}

function importGroups(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            let imported = JSON.parse(e.target.result);
            let rawData = localStorage.getItem('KPOP_LINE_SAVED_GROUPS');
            let current = rawData ? JSON.parse(rawData) : [];
            let merged = [...current, ...imported]; // ou substitui, se preferir
            localStorage.setItem('KPOP_LINE_SAVED_GROUPS', JSON.stringify(merged));
            renderMainSetupSaves();
            alert("GRUPOS IMPORTADOS COM SUCESSO!");
        } catch (err) {
            alert("ARQUIVO INVÁLIDO");
        }
    };
    reader.readAsText(file);
  }


    function makeCombinedLine() {
        if(selectedLineGroups.length === 0) { alert("SELECIONE PELO MENOS 1 GRUPO ☆"); return; }
        let rawData = localStorage.getItem('KPOP_LINE_SAVED_GROUPS');
        let arrayData = rawData ? JSON.parse(rawData) : [];
        let combinedMembers = [];

        selectedLineGroups.forEach(i => {
            if(arrayData[i]) {
                arrayData[i].members.forEach(m => {
                    combinedMembers.push({
                        id: combinedMembers.length, name: m.name, pos: m.pos, color: m.color, img: m.img, time: 0, active: false, muted: false, posShown: false
                    });
                });
            }
        });

        if(combinedMembers.length === 0) { alert("NENHUM MEMBRO ENCONTRADO 💔"); return; }
        members = combinedMembers;
        if(activeLoop) cancelAnimationFrame(activeLoop);
        document.getElementById('title-input').value = "COMBINED LINE";
        document.getElementById('setup').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        document.getElementById('save-group-creator').classList.add('hidden');
        document.getElementById('save-manager-dialog').classList.add('hidden');
        buildViewportDOM(); updateLineSizes(currentLineHeight);
        lastTime = performance.now(); loop();
        selectedLineGroups = [];
      }
